name: refresh

on:
  # Every 30 min during weekday work hours (US Central is UTC-6 / UTC-5 DST).
  # Cron is UTC, so cover 14:00–23:30 UTC, Mon-Fri.
  schedule:
    - cron: "*/30 14-23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: render README.md
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_DASHBOARD }}
        run: python3 render_readme.py

      - name: commit if changed
        run: |
          if [[ -z "$(git status --porcelain README.md)" ]]; then
            echo "no changes"
            exit 0
          fi
          git config user.name  "dashboard-bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh dashboard $(date -u +%FT%TZ)"
          git push
